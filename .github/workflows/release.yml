name: Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

jobs:
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            bundles: deb,appimage
            label: ubuntu-22.04
          - platform: ubuntu-24.04
            bundles: deb,appimage
            label: ubuntu-24.04

    runs-on: ${{ matrix.platform }}
    name: Linux (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - run: bun install

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.release_tag }}
          releaseName: 'Release ${{ inputs.release_tag }}'
          releaseDraft: ${{ inputs.draft }}
          prerelease: false
          args: --bundles ${{ matrix.bundles }}

  build-linux-rpm:
    runs-on: ubuntu-22.04
    name: Linux (Fedora/RHEL - rpm)
    container:
      image: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc \
            webkit2gtk4.1-devel \
            openssl-devel \
            libappindicator-gtk3-devel \
            librsvg2-devel \
            xdotool-devel \
            rpm-build \
            curl \
            unzip

      - name: Install Bun
        run: |
          curl -fsSL https://bun.sh/install | bash
          echo "$HOME/.bun/bin" >> $GITHUB_PATH

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: bun install

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.release_tag }}
          releaseName: 'Release ${{ inputs.release_tag }}'
          releaseDraft: ${{ inputs.draft }}
          prerelease: false
          args: --bundles rpm

  build-windows:
    runs-on: windows-latest
    name: Windows

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: bun install

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.release_tag }}
          releaseName: 'Release ${{ inputs.release_tag }}'
          releaseDraft: ${{ inputs.draft }}
          prerelease: false
